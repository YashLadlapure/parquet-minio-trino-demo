version: "3.8"

services:

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - trino-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trino-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      SKIP_SCHEMA_INIT: "false"
      # Tell the entrypoint to skip its own env-based config injection
      # and use our mounted hive-site.xml directly
      DB_DRIVER: postgres
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
    ports:
      - "9083:9083"
    networks:
      - trino-net
    command: ["hive", "--service", "metastore"]
    healthcheck:
      test: ["CMD-SHELL", "ss -tnlp | grep 9083 || netstat -tnlp 2>/dev/null | grep 9083"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  hiveserver2:
    image: apache/hive:3.1.3
    container_name: hiveserver2
    depends_on:
      hive-metastore:
        condition: service_healthy
    environment:
      SERVICE_NAME: hiveserver2
      DB_DRIVER: postgres
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
    ports:
      - "10000:10000"
      - "10002:10002"
    networks:
      - trino-net
    command: ["hive", "--service", "hiveserver2"]

  trino:
    image: trinodb/trino:435
    container_name: trino
    depends_on:
      - hive-metastore
    ports:
      - "8080:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog
    networks:
      - trino-net

volumes:
  minio_data:
  postgres_data:

networks:
  trino-net:
    driver: bridge
