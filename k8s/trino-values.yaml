# Helm values for Trino
# Reference: https://trinodb.github.io/charts

coordinator:
  resources:
    requests:
      memory: 1Gi
      cpu: 500m

worker:
  replicas: 1
  resources:
    requests:
      memory: 1Gi
      cpu: 500m

additionalCatalogs:
  hive: |-
    connector.name=hive
    hive.metastore.uri=thrift://hive-metastore.hive.svc.cluster.local:9083
    hive.s3.aws-access-key=minioadmin
    hive.s3.aws-secret-key=minioadmin
    hive.s3.endpoint=http://minio.minio.svc.cluster.local:9000
    hive.s3.path-style-access=true
    hive.s3.ssl.enabled=false
    hive.non-managed-table-writes-enabled=true
