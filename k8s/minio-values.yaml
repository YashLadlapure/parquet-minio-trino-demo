# Helm values for MinIO
# Reference: https://github.com/minio/minio/tree/master/helm/minio

mode: standalone

rootUser: minioadmin
rootPassword: minioadmin

replicas: 1

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    memory: 512Mi

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: NodePort
  port: 9001
