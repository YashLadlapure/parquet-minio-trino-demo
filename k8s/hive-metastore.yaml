apiVersion: apps/v1
kind: Deployment
metadata:
  name: hive-metastore
  namespace: hive
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
        - name: hive-metastore
          image: apache/hive:3.1.3
          command: ["hive", "--service", "metastore"]
          env:
            - name: DB_DRIVER
              value: postgres
            - name: SERVICE_NAME
              value: metastore
            - name: HIVE_METASTORE_WAREHOUSE_DIR
              value: s3a://demo-bucket/warehouse
          envFrom:
            - configMapRef:
                name: hive-env
          ports:
            - containerPort: 9083
---
apiVersion: v1
kind: Service
metadata:
  name: hive-metastore
  namespace: hive
spec:
  selector:
    app: hive-metastore
  ports:
    - port: 9083
      targetPort: 9083
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-env
  namespace: hive
data:
  # adjust these to match your MinIO service ClusterIP or DNS
  AWS_ACCESS_KEY_ID: minioadmin
  AWS_SECRET_ACCESS_KEY: minioadmin
  HIVE_SITE_CONF_fs_s3a_endpoint: http://minio.minio.svc.cluster.local:9000
  HIVE_SITE_CONF_fs_s3a_path_style_access: "true"
  HIVE_SITE_CONF_fs_s3a_connection_ssl_enabled: "false"
  HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: jdbc:postgresql://postgres.hive.svc.cluster.local:5432/metastore
  HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: org.postgresql.Driver
  HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: hive
  HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: hive
